<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:#D9D8CF;color:#867A65;

}
a{color:#867A65;}
a.spotify{color:#1a0dab;}

.site-header{
  border-bottom:1px solid #867A65;padding:18px 24px;
  display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;
}
.brand{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;}
.week-label{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.65;}

.controls{
  border-bottom:1px solid #867A65;padding:14px 24px;
  display:flex;flex-wrap:wrap;gap:18px;align-items:flex-start;font-size:11px;

}
.control-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.control-label{opacity:0.65;margin-right:4px;}
.chip{

.chip.active{background:#867A65;color:#D9D8CF;}
.chip:focus{outline:1px dotted #867A65;outline-offset:2px;}
input[type=time]{
  border:1px solid #867A65;background:transparent;color:#867A65;
  padding:3px 6px;font-family:inherit;font-size:11px;
}
.reset{margin-left:auto;}

main{display:flex;flex:1 1 auto;min-height:0;}

.list-pane{
  width:55%;max-width:720px;overflow-y:auto;padding:0 24px 48px;
  border-right:1px solid #867A65;
}
.map-pane{flex:1 1 auto;position:relative;}
#map{position:absolute;inset:0;}
.leaflet-tile-pane{filter:invert(1) hue-rotate(9deg);}

.empty{padding:48px 24px;font-size:12px;opacity:0.65;}

.day-divider{
  border-top:1px solid #867A65;padding:18px 0 12px;margin-top:8px;
  font-size:12px;letter-spacing:0.10em;text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;
}
.day-divider:first-child{border-top:none;}
.day-divider .playlist-link{
  font-size:10px;letter-spacing:0.08em;text-transform:uppercase;
  border:1px solid #867A65;padding:3px 10px;text-decoration:none;
}

.gig{
  padding:18px 0;border-bottom:1px solid rgba(134,122,101,0.2);
  cursor:pointer;
}
.gig:last-child{border-bottom:none;}
.gig.is-active{background:rgba(134,122,101,0.1);}
.gig-title{font-size:15px;margin-bottom:4px;}
.gig-meta{font-size:12px;opacity:0.70;margin-bottom:6px;}
.gig-meta a{color:inherit;text-decoration:underline;}
.gig-lineup{font-size:12px;line-height:1.5;margin-bottom:6px;}
.gig-lineup a{text-decoration:underline;}
.no-coords{
  font-size:9px;letter-spacing:0.08em;text-transform:uppercase;
  border:1px solid rgba(134,122,101,0.5);padding:1px 6px;margin-left:6px;opacity:0.6;
}
.view-event{font-size:11px;letter-spacing:0.04em;}

.leaflet-popup-content-wrapper{
  background:#D9D8CF !important;border:1px solid #867A65 !important;
  border-radius:0 !important;box-shadow:none !important;padding:0 !important;
}
.leaflet-popup-tip{background:#D9D8CF !important;box-shadow:none !important;}
.leaflet-popup-tip-container{margin-top:-1px;}
.leaflet-popup-content{margin:0 !important;color:#867A65;font-family:inherit;}
.leaflet-popup-close-button{color:#867A65 !important;font-size:16px !important;top:8px !important;right:8px !important;}
.popup-inner{padding:14px 18px 12px;min-width:220px;max-width:280px;}
.popup-venue{
  font-size:11px;letter-spacing:0.10em;text-transform:uppercase;
  margin-bottom:12px;border-bottom:1px solid rgba(134,122,101,0.3);padding-bottom:8px;
}
.popup-venue a{color:#867A65;text-decoration:none;}
.popup-gig{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(134,122,101,0.15);}
.popup-gig:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.popup-title{font-size:13px;margin-bottom:3px;}
.popup-meta{font-size:11px;opacity:0.65;margin-bottom:3px;}
.popup-lineup{font-size:11px;margin-bottom:5px;line-height:1.4;}
.popup-link{font-size:10px;letter-spacing:0.05em;}

.dn-marker{
  width:10px;height:10px;background:#867A65;
  border:2px solid #D9D8CF;border-radius:50%;box-shadow:0 0 0 1px #867A65;
}

.site-footer{
  border-top:1px solid #867A65;padding:14px 24px;font-size:10px;
  letter-spacing:0.10em;text-transform:uppercase;opacity:0.5;
}

@media (max-width:780px){
  main{flex-direction:column;}
  .list-pane{width:100%;max-width:none;border-right:none;border-bottom:1px solid #867A65;order:2;}
  .map-pane{height:50vh;flex:0 0 auto;order:1;}
}
</style>

(function(){
  const fmtDate = (iso) => {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-AU', {weekday:'long', day:'numeric', month:'short'});
  };
  const fmtShortDate = (iso) => {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short'});
  };
  const escapeHtml = (s) => String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));

  const params = new URLSearchParams(location.search);
  const allDates = Array.from(new Set(GIGS.map(g => g.date))).sort();
  const allVenues = Array.from(new Set(GIGS.map(g => g.venue))).sort((a,b)=>a.localeCompare(b));

  const csvParam = (k) => {
    const v = params.get(k);
    return v ? v.split(',').filter(Boolean) : [];
  };
  const state = {
    sort: params.get('sort') === 'venue' ? 'venue' : 'date',
    date: params.get('date') || '',
    timeMin: params.get('time_min') || '',
    timeMax: params.get('time_max') || '',
    entry: ['free','ticketed'].includes(params.get('entry')) ? params.get('entry') : '',
    venues: new Set(csvParam('venues')),
  };

  const syncUrl = () => {
    const p = new URLSearchParams();
    if (state.sort !== 'date') p.set('sort', state.sort);
    if (state.date) p.set('date', state.date);
    if (state.timeMin) p.set('time_min', state.timeMin);
    if (state.timeMax) p.set('time_max', state.timeMax);
    if (state.entry) p.set('entry', state.entry);
    if (state.venues.size) p.set('venues', Array.from(state.venues).join(','));
    const qs = p.toString();
    history.replaceState(null, '', qs ? '?'+qs : location.pathname);
  };

  const parseTime = (t) => {
    if (!t) return null;
    const m = String(t).match(/(\d{1,2}):(\d{2})/);
    if (!m) return null;
    return parseInt(m[1],10)*60 + parseInt(m[2],10);
  };

  const filterGigs = () => {
    const minM = state.timeMin ? parseTime(state.timeMin) : null;
    const maxM = state.timeMax ? parseTime(state.timeMax) : null;
    return GIGS.filter(g => {
      if (state.date && g.date !== state.date) return false;
      if (state.entry === 'free' && !g.is_free) return false;
      if (state.entry === 'ticketed' && g.is_free) return false;
      if (state.venues.size && !state.venues.has(g.venue)) return false;
      if (minM != null || maxM != null) {
        const t = parseTime(g.time);
        if (t == null) return false;
        if (minM != null && t < minM) return false;
        if (maxM != null && t > maxM) return false;
      }
      return true;
    });
  };

  const sortGigs = (list) => {
    const out = list.slice();
    out.sort((a,b) => {
      if (state.sort === 'venue') {
        const v = a.venue.localeCompare(b.venue);
        if (v !== 0) return v;
      }
      const d = a.date.localeCompare(b.date);
      if (d !== 0) return d;
      const at = parseTime(a.time), bt = parseTime(b.time);
      if (at == null && bt != null) return 1;
      if (bt == null && at != null) return -1;
      if (at != null && bt != null && at !== bt) return at - bt;
      const v2 = a.venue.localeCompare(b.venue);
      if (v2 !== 0) return v2;
      return a.title.localeCompare(b.title);
    });
    return out;
  };

  const lineupHtml = (lineup) => {
    if (!lineup.length) return '<span class="gig-lineup">(artist TBA)</span>';
    return '<div class="gig-lineup">' + lineup.map(a =>
      a.url
        ? `<a class="spotify" href="${escapeHtml(a.url)}" target="_blank" rel="noopener">${escapeHtml(a.name)}</a>`
        : escapeHtml(a.name)
    ).join(' | ') + '</div>';
  };

  const popupLineupHtml = (lineup) => {
    if (!lineup.length) return '<div class="popup-lineup">(artist TBA)</div>';
    return '<div class="popup-lineup">' + lineup.map(a =>
      a.url
        ? `<a class="spotify" href="${escapeHtml(a.url)}" target="_blank" rel="noopener">${escapeHtml(a.name)}</a>`
        : escapeHtml(a.name)
    ).join(' | ') + '</div>';
  };

  const venueHtml = (g) => g.google_maps_url
    ? `<a href="${escapeHtml(g.google_maps_url)}" target="_blank" rel="noopener">${escapeHtml(g.venue)}</a>`
    : escapeHtml(g.venue);

  const buildVenuePopup = (venueGigs) => {
    const first = venueGigs[0];
    let html = '<div class="popup-inner">';
    html += '<div class="popup-venue">';
    html += first.google_maps_url
      ? `<a href="${escapeHtml(first.google_maps_url)}" target="_blank" rel="noopener">${escapeHtml(first.venue)}</a>`
      : escapeHtml(first.venue);
    html += '</div>';
    for (const g of venueGigs) {
      html += '<div class="popup-gig">';
      html += `<div class="popup-title">${escapeHtml(g.title)}</div>`;
      const meta = [];
      meta.push(fmtShortDate(g.date));
      if (g.time) meta.push(escapeHtml(g.time));
      if (g.is_free) meta.push('Free');
      else if (g.price_str) meta.push(escapeHtml(g.price_str));
      html += `<div class="popup-meta">${meta.join(' &middot; ')}</div>`;
      html += popupLineupHtml(g.lineup);
      if (g.ticket_url) {
        html += `<div class="popup-link"><a href="${escapeHtml(g.ticket_url)}" target="_blank" rel="noopener">View event &#8594;</a></div>`;
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  };

  // ---- DOM setup ----
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('result-count');

  // Filter controls
  const dateChips = document.getElementById('date-chips');
  allDates.forEach(d => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.dataset.date = d;
    b.textContent = fmtShortDate(d);
    b.addEventListener('click', () => {
      state.date = (state.date === d) ? '' : d;
      render();
    });
    dateChips.appendChild(b);
  });

  const venueChips = document.getElementById('venue-chips');
  allVenues.forEach(v => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.dataset.venue = v;
    b.textContent = v;
    b.addEventListener('click', () => {
      if (state.venues.has(v)) state.venues.delete(v);
      else state.venues.add(v);
      render();
    });
    venueChips.appendChild(b);
  });

  document.querySelectorAll('[data-entry]').forEach(b => {
    b.addEventListener('click', () => {
      const e = b.dataset.entry;
      state.entry = (state.entry === e) ? '' : e;
      render();
    });
  });
  document.querySelectorAll('[data-sort]').forEach(b => {
    b.addEventListener('click', () => {
      state.sort = b.dataset.sort;
      render();
    });
  });

  const tMin = document.getElementById('time-min');
  const tMax = document.getElementById('time-max');
  tMin.addEventListener('change', () => { state.timeMin = tMin.value; render(); });
  tMax.addEventListener('change', () => { state.timeMax = tMax.value; render(); });

  document.getElementById('reset').addEventListener('click', () => {
    state.sort = 'date';
    state.date = '';
    state.timeMin = '';
    state.timeMax = '';
    state.entry = '';
    state.venues.clear();
    render();
  });

  // ---- Map ----
  const map = L.map('map', {zoomControl:false}).setView([-37.775, 144.985], 13);
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);
  const dnIcon = L.divIcon({
    className:'',
    html:'<div class="dn-marker"></div>',
    iconSize:[10,10],
    iconAnchor:[5,5],
    popupAnchor:[0,-10],
  });
  let markers = [];
  const markerByVenue = new Map();

  // ---- Render ----
  function render(){
    syncUrl();

    // chip active states
    dateChips.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', b.dataset.date === state.date);
    });
    venueChips.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', state.venues.has(b.dataset.venue));
    });
    document.querySelectorAll('[data-entry]').forEach(b => {
      b.classList.toggle('active', b.dataset.entry === state.entry);
    });
    document.querySelectorAll('[data-sort]').forEach(b => {
      b.classList.toggle('active', b.dataset.sort === state.sort);
    });
    tMin.value = state.timeMin;
    tMax.value = state.timeMax;

    const filtered = filterGigs();
    const sorted = sortGigs(filtered);
    countEl.textContent = sorted.length === 1 ? '1 gig' : sorted.length + ' gigs';

    listEl.innerHTML = '';
    if (!sorted.length) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.textContent = 'No gigs match these filters.';
      listEl.appendChild(e);
    } else if (state.sort === 'date') {
      let lastDate = null;
      for (const g of sorted) {
        if (g.date !== lastDate) {
          lastDate = g.date;
          const div = document.createElement('div');
          div.className = 'day-divider';
          const playlistUrl = (GIGS.find(x => x.date === g.date) || {}).playlist_url;
          div.innerHTML = `<span>${escapeHtml(fmtDate(g.date))}</span>` +
            (playlistUrl ? `<a class="playlist-link" href="${escapeHtml(playlistUrl)}" target="_blank" rel="noopener">Playlist</a>` : '');
          listEl.appendChild(div);
        }
        listEl.appendChild(buildGigEl(g));
      }
    } else {
      // sort=venue: group by venue
      let lastVenue = null;
      for (const g of sorted) {
        if (g.venue !== lastVenue) {
          lastVenue = g.venue;
          const div = document.createElement('div');
          div.className = 'day-divider';
          div.innerHTML = `<span>${escapeHtml(g.venue)}</span>`;
          listEl.appendChild(div);
        }
        listEl.appendChild(buildGigEl(g));
      }
    }

    // Markers — group filtered gigs by venue (lat,lng) and one marker each
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    markerByVenue.clear();
    const byVenue = new Map();
    for (const g of sorted) {
      if (g.lat == null || g.lng == null) continue;
      if (!byVenue.has(g.venue)) byVenue.set(g.venue, []);
      byVenue.get(g.venue).push(g);
    }
    byVenue.forEach((venueGigs, vname) => {
      const v = venueGigs[0];
      const m = L.marker([v.lat, v.lng], {icon: dnIcon}).addTo(map)
        .bindPopup(buildVenuePopup(venueGigs));
      markers.push(m);
      markerByVenue.set(vname, m);
    });
  }

  function buildGigEl(g){
    const el = document.createElement('div');
    el.className = 'gig';
    el.dataset.venue = g.venue;
    el.dataset.gigId = g.date + '|' + g.venue + '|' + g.title;

    const meta = [];
    if (state.sort === 'venue') {
      meta.push(escapeHtml(fmtShortDate(g.date)));
    } else {
      meta.push(venueHtml(g));
    }
    if (g.time) meta.push(escapeHtml(g.time));
    if (g.is_free) meta.push('Free');
    else if (g.price_str) meta.push(escapeHtml(g.price_str));

    const noCoords = (g.lat == null || g.lng == null)
      ? '<span class="no-coords">no map</span>' : '';

    el.innerHTML =
      `<div class="gig-title">${escapeHtml(g.title)}${noCoords}</div>` +
      `<div class="gig-meta">${meta.join(' &middot; ')}</div>` +
      lineupHtml(g.lineup) +
      (g.ticket_url
        ? `<div class="view-event"><a href="${escapeHtml(g.ticket_url)}" target="_blank" rel="noopener">View event &rarr;</a></div>`
        : '');

    el.addEventListener('click', (e) => {
      // Don't hijack clicks on links inside the row
      if (e.target.closest('a')) return;
      if (g.lat == null || g.lng == null) return;
      map.flyTo([g.lat, g.lng], 16, {duration: 0.6});
      const m = markerByVenue.get(g.venue);
      if (m) setTimeout(() => m.openPopup(), 600);
      document.querySelectorAll('.gig.is-active').forEach(x => x.classList.remove('is-active'));
      el.classList.add('is-active');
    });

    return el;
  }

  render();
})();

</script>
</body>
</html>
